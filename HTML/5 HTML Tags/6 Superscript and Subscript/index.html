<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Superscripts and Subscripts</h1>

    <h2>Superscripts</h2>

    <h3>Without superscript tag</h3>
    <p>(a + b)2 = a2 + b2 + 2ab</p>

    <h3>With superscript tag</h3>
    <p>(a + b)<sup>2</sup> = a<sup>2</sup> + b<sup>2</sup> + 2ab</p>
    
    
    <h2>Subscripts</h2>

    <h3>Without subscript tag</h3>
    <p>CO2, H2O, O2, CH4</p>
    
    <h3>With subscript tag</h3>
    <p>CO<sub>2</sub>, H<sub>2</sub>O, O<sub>2</sub>, CH<sub>4</sub></p>
</body>
</html>
