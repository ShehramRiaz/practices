<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comments and Mixed Case Tag Names</title>
</head>

<body>
    <!-- This is a single line comment -->
    <p>This is small case paragraph tag.</p>
    <P>This is upper case paragraph tag.</P>
    <dIV>This is a mixed case div tag.</Div>
    <!-- 
        This 
        is a multiline 
        comment.
    -->
</body>

</html>
