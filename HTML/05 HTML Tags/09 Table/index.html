<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>
<body>
    <table border="1">
        <caption>Technologies</caption>

        <tr>
            <th colspan="4">Col Span</th>
        </tr>
        
        <tr>
            <th rowspan="5">Row Span</th>
            <th>Language</th>
            <th>Competency</th>
            <th>Years</th>
        </tr>
        
        <tr>
            <td>C</td>
            <td>5/10</td>
            <td>1</td>
        </tr>
        
        <tr>
            <td>C++</td>
            <td>7/10</td>
            <td>2</td>
        </tr>
        
        <tr>
            <td>HTML</td>
            <td>9/10</td>
            <td>5</td>
        </tr>
        
        <tr>
            <td>CSS</td>
            <td>8/10</td>
            <td>4</td>
        </tr>
    </table>
</body>
</html>
