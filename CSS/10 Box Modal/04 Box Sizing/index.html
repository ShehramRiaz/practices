<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Sizing Property</title>

    <style>
        .box {
            width: 100px;
            height: 100px;
            background-color: forestgreen;
            padding: 20px;
            border: 5px solid orange;
            margin: 10px;
        }

        #box-1 {
            /* Default Value */
            box-sizing: content-box;
        }

        #box-2 {
            box-sizing: border-box;
        }
    </style>

</head>

<body>
    <!-- Size of element = content + padding + border i.e 100 + 40 + 10 = 150 x 150 -->
    <div class="box" id="box-1">Box 1</div>

    <!-- Size of element = CSS width property x CSS height property i.e 100 x 100 -->
    <div class="box" id="box-2">Box 2</div>
</body>

</html>
