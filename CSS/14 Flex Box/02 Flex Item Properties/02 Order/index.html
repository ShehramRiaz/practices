<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS order</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 80%;
            height: 500px;
            background-color: yellow;
            border: 2px solid;
            display: flex;
        }

        .item {
            width: 100px;
            height: 100px;
            background-color: cornflowerblue;
            margin: 5px;
            padding: 5px;
        }

        .item-1 {
            order: 3;
        }

        .item-2 {
            order: 4;
        }

        .item-3 {
            order: 2;
        }

        .item-4 {
            order: 1;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="item item-1">Item-1</div>
        <div class="item item-2">Item-2</div>
        <div class="item item-3">Item-3</div>
        <div class="item item-4">Item-4</div>
    </div>
</body>

</html>
