<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Element Selector</title>
    <style>
        h1 {
            color: cornflowerblue;
        }
        
        h2 {
            color: coral;
        }

        p {
            color: chartreuse;
        }
    </style>
</head>

<body>
    <h1>CSS Selectors</h1>

    <h2>This is sub-heading 1.</h2>
    <p>This is paragraph 1</p>

    <h2>This is sub-heading 2.</h2>
    <p>This is paragraph 2</p>
</body>

</html>
