<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Selector</title>

    <style>
        * {
            color: chocolate;
        }

        section * {
            color: chartreuse;
        }
    </style>
    
</head>

<body>
    <h1>Universal Selector in CSS</h1>

    <p>Lorem ipsum dolor sit amet consectetur.</p>

    <pre>This is a pre tag</pre>

    <div>This is a div</div>

    <span>This is a span</span>

    <a href="#">This is an anchor tag</a> <br>

    <button>This is a button</button>

    <section>
        <h2>This is a subheading</h2>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. In natus fugiat nemo maiores commodi veniam earum
            sapiente dicta odit! Neque!</p>
    </section>
</body>

</html>
