<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>CSS Transform</title>
</head>

<body>
    <h1>CSS Transform Property</h1>

    <section class="container">
        <h2>Rotate</h2>

        <div class="value-wrapper">
            <article>
                <h3>Rotate X</h3>
                <div class="card rotate-x"></div>
            </article>

            <article>
                <h3>Rotate Y</h3>
                <div class="card rotate-y"></div>
            </article>

            <article>
                <h3>Rotate Z</h3>
                <div class="card rotate-z"></div>
            </article>
        </div>
    </section>

    <section class="container">
        <h2>Scale</h2>

        <div class="value-wrapper">
            <article>
                <h3>Scale X</h3>
                <div class="card scale-x"></div>
            </article>

            <article>
                <h3>Scale Y</h3>
                <div class="card scale-y"></div>
            </article>

            <article>
                <h3>Scale X, Y</h3>
                <div class="card scale-x-y"></div>
            </article>
        </div>
    </section>

    <section class="container">
        <h2>Translate</h2>

        <div class="value-wrapper">
            <article>
                <h3>Translate X</h3>
                <div class="card translate-x"></div>
            </article>

            <article>
                <h3>Translate Y</h3>
                <div class="card translate-y"></div>
            </article>

            <article>
                <h3>Translate X, Y</h3>
                <div class="card translate-x-y"></div>
            </article>
        </div>
    </section>

    <section class="container">
        <h2>Skew</h2>

        <div class="value-wrapper">
            <article>
                <h3>Skew X</h3>
                <div class="card skew-x"></div>
            </article>

            <article>
                <h3>Skew Y</h3>
                <div class="card skew-y"></div>
            </article>
        </div>
    </section>
</body>

</html>
