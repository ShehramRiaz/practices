<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Structural Pseudo Classes</title>
</head>

<body>
    <div class="container">
        <p>First Paragraph</p>
        <div>First Div</div>
        <span>First Span</span>

        <p>Second Paragraph</p>
        <div>Second Div</div>
        <span>Second Span</span>

        <p>Third Paragraph</p>
        <div>Third Div</div>
        <span>Third Span</span>

        <p>Fourth Paragraph</p>
        <div>Fourth Div</div>
        <span>Fourth Span</span>

        <div>
            <p>Only Child Paragraph</p>
        </div>

        <div>
            <p>Paragraph inside Div</p>
            <p></p>
            <div>Div inside Div</div>
        </div>

        <p>Last Paragraph</p>
        <div>Last Div</div>
        <span>Last Span</span>
    </div>
</body>

</html>
