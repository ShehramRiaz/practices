<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/7dca95f0f5.js" crossorigin="anonymous"></script>
    <title>Font Awesome Icons in CSS</title>
    <style>
        /* We can apply font properties to font icons!! */
        .bag {
            color: orange;
        }

        .bars {
            font-size: 24px;
        }

        .linkedin {
            background-color: cyan;
            color: blue;
        }
    </style>
</head>

<body>
    <i class="fa-solid fa-shopping-bag bag"></i>
    <i class="fa-solid fa-bars bars"></i>
    <i class="fa-brands fa-linkedin linkedin"></i>
</body>

</html>
