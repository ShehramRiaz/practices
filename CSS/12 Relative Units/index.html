<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relative Units</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 20px;
        }

        .parent {
            font-size: 30px;
            width: 50vw;
            height: 50vh;
            background-color: magenta;
        }

        .child {
            width: 50%;
            height: 40%;
            background-color: greenyellow;
            margin: 5px;
        }

        .child1 {
            font-size: 0.5em;
        }

        .child2 {
            font-size: 0.5rem;
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="child child1">Child 1</div>
        <div class="child child2">Child 2</div>
    </div>
</body>

</html>
