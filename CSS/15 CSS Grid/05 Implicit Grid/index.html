<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Implicit Grid Rows and Columns</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            width: 80%;
            background-color: lightcoral;
            margin: 50px auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 100px);

            /* Default - grid rows are filled first - new auto rows are generated */
            grid-auto-flow: row;

            /* Auto rows are generated */
            grid-auto-rows: 60px;

            grid-auto-flow: column;

            /* Auto columns are generated */
            grid-auto-columns: 90px;
        }

        .item {
            background-color: lightskyblue;
            border: 1px solid;
            padding: 5px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="item item-1">item-1</div>
        <div class="item item-2">item-2</div>
        <div class="item item-3">item-3</div>
        <div class="item item-4">item-4</div>
        <div class="item item-5">item-5</div>
        <div class="item item-6">item-6</div>
        <div class="item item-7">item-7</div>
        <div class="item item-8">item-8</div>
        <div class="item item-9">item-9</div>
        <div class="item item-10">item-10</div>
        <div class="item item-11">item-11</div>
        <div class="item item-12">item-12</div>
        <div class="item item-13">item-13</div>
        <div class="item item-14">item-14</div>
        <div class="item item-15">item-15</div>
        <div class="item item-16">item-16</div>
    </div>
</body>

</html>
