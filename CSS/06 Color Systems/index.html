<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Color Systems</title>
    <style>
        .para {
            /* rgb */
            color: rgb(134, 48, 219);

            /* HEX */
            background-color: #25c2c2;
        }

        .para-alpha {
            /* rgb with alpha channel */
            color: rgba(134, 48, 219, .5);

            /* HEX with alpha channel */
            background-color: #25c2c2cc;
        }
    </style>
</head>

<body>
    <p class="para">
        Lorem ipsum dolor, sit amet consectetur adipisicing elit. Autem laborum esse aperiam at deserunt
        iure aliquid minus illum. Quisquam.
    </p>

    <p class="para-alpha">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Harum delectus incidunt, tenetur necessitatibus sint
        iusto error beatae voluptas.
    </p>

</body>

</html>
